<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Vial Municipal — Mapa de Baches</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; }

    /* ── Barra superior ── */
    header {
      height: 56px; background: #1a3a5c;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      position: relative; z-index: 1000;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.8rem; color: #90bfdf; }
    .nav-links a {
      color: #90bfdf; text-decoration: none; margin-left: 20px;
      font-size: 0.85rem; padding: 6px 12px; border-radius: 4px;
      transition: background 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { background: #2e6da4; color: #fff; }

    /* ── Layout ── */
    .contenedor { display: flex; height: calc(100vh - 56px); }

    /* ── Panel izquierdo ── */
    .panel {
      width: 300px; background: #152536; overflow-y: auto;
      border-right: 1px solid #1e3a52; padding: 16px; flex-shrink: 0;
    }
    .panel h2 { font-size: 0.85rem; color: #90bfdf; text-transform: uppercase;
                letter-spacing: 0.08em; margin-bottom: 12px; }

    /* Tarjetas KPI mini */
    .kpi-mini {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;
    }
    .kpi-card {
      background: #1e3a52; border-radius: 8px; padding: 12px; text-align: center;
    }
    .kpi-card .valor { font-size: 1.5rem; font-weight: 700; color: #4fc3f7; }
    .kpi-card .etiqueta { font-size: 0.7rem; color: #7fa8c4; margin-top: 2px; }
    .kpi-card.critico .valor { color: #ef5350; }
    .kpi-card.ok .valor { color: #66bb6a; }

    /* Filtros */
    .filtros { margin-bottom: 20px; }
    .filtros select, .filtros input {
      width: 100%; padding: 8px 10px; margin-bottom: 8px;
      background: #1e3a52; border: 1px solid #2e6da4;
      color: #e0e0e0; border-radius: 6px; font-size: 0.85rem;
    }
    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 6px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px;
    }
    .btn-primary  { background: #2e6da4; color: #fff; }
    .btn-success  { background: #2e7d32; color: #fff; }
    .btn-warning  { background: #e65100; color: #fff; }
    .btn:hover { filter: brightness(1.15); }

    /* Leyenda */
    .leyenda { margin-bottom: 20px; }
    .ley-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; margin-bottom: 6px;
    }
    .ley-dot {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    }

    /* Lista de baches recientes */
    .lista-baches { }
    .bache-item {
      background: #1e3a52; border-radius: 6px; padding: 10px;
      margin-bottom: 8px; cursor: pointer; border-left: 3px solid #2e6da4;
      transition: background 0.2s;
    }
    .bache-item:hover { background: #264a6a; }
    .bache-item.critico  { border-color: #ef5350; }
    .bache-item.grave    { border-color: #ff7043; }
    .bache-item.moderado { border-color: #ffa726; }
    .bache-item.leve     { border-color: #66bb6a; }
    .bache-item .bi-header {
      display: flex; justify-content: space-between; font-size: 0.75rem;
    }
    .bi-sev {
      font-weight: 700; font-size: 0.7rem; padding: 2px 6px;
      border-radius: 10px; color: #fff;
    }
    .sev-critico  { background: #ef5350; }
    .sev-grave    { background: #ff7043; }
    .sev-moderado { background: #ffa726; color: #000; }
    .sev-leve     { background: #66bb6a; color: #000; }
    .bi-coords { font-size: 0.7rem; color: #7fa8c4; margin-top: 4px; }
    .bi-costo  { font-size: 0.75rem; color: #4fc3f7; margin-top: 2px; }

    /* Mapa */
    #mapa { flex: 1; }

    /* Popup personalizado */
    .popup-bache h3 { margin-bottom: 6px; font-size: 0.95rem; }
    .popup-bache table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
    .popup-bache td { padding: 3px 6px; }
    .popup-bache tr:nth-child(even) td { background: #f5f5f5; }
    .popup-bache .popup-foto {
      width: 100%; margin-top: 8px; border-radius: 4px;
      cursor: zoom-in; transition: opacity .2s;
    }
    .popup-bache .popup-foto:hover { opacity: 0.85; }
    .popup-bache .btn-reparar {
      margin-top: 8px; width: 100%; padding: 6px;
      background: #2e7d32; color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-weight: 600;
    }

    /* Modal de zoom */
    #modal-foto {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.88); align-items: center; justify-content: center;
    }
    #modal-foto.visible { display: flex; }
    #modal-foto img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    #modal-foto .cerrar {
      position: fixed; top: 18px; right: 24px;
      color: #fff; font-size: 2rem; cursor: pointer;
      background: rgba(0,0,0,0.5); border-radius: 50%;
      width: 42px; height: 42px; display: flex;
      align-items: center; justify-content: center; line-height: 1;
    }
    #modal-info {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; padding: 8px 20px;
      border-radius: 20px; font-size: 0.85rem; white-space: nowrap;
    }

    /* Vista calor / puntos */
    .toggle-vista {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .toggle-vista button {
      flex: 1; padding: 6px; border: 1px solid #2e6da4;
      background: transparent; color: #90bfdf; border-radius: 4px;
      cursor: pointer; font-size: 0.78rem;
    }
    .toggle-vista button.activo { background: #2e6da4; color: #fff; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f1923; }
    ::-webkit-scrollbar-thumb { background: #2e6da4; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>🛣️ Sistema de Gestión Vial Municipal</h1>
  <span id="reloj"></span>
  <nav class="nav-links">
    <a href="/" class="active">Mapa</a>
    <a href="/kpi">KPIs</a>
    <a href="/api/docs" target="_blank">API</a>
  </nav>
</header>

<!-- Modal zoom de foto -->
<div id="modal-foto" onclick="cerrarModal()">
  <span class="cerrar" onclick="cerrarModal()">✕</span>
  <img id="modal-img" src="" alt="Bache zoom"/>
  <div id="modal-info"></div>
</div>

<div class="contenedor">

  <!-- ── Panel lateral ── -->
  <div class="panel">

    <h2>Resumen</h2>
    <div class="kpi-mini">
      <div class="kpi-card"><div class="valor" id="k-total">—</div><div class="etiqueta">Total baches</div></div>
      <div class="kpi-card ok"><div class="valor" id="k-rep">—</div><div class="etiqueta">Reparados</div></div>
      <div class="kpi-card critico"><div class="valor" id="k-crit">—</div><div class="etiqueta">Críticos</div></div>
      <div class="kpi-card"><div class="valor" id="k-costo">—</div><div class="etiqueta">Costo USD</div></div>
    </div>

    <h2>Vista</h2>
    <div class="toggle-vista">
      <button id="btn-calor" class="activo" onclick="setVista('calor')">🔥 Calor</button>
      <button id="btn-puntos" onclick="setVista('puntos')">📍 Puntos</button>
    </div>

    <h2>Filtros</h2>
    <div class="filtros">
      <select id="f-severidad" onchange="aplicarFiltros()">
        <option value="">Todas las severidades</option>
        <option value="critico">Crítico</option>
        <option value="grave">Grave</option>
        <option value="moderado">Moderado</option>
        <option value="leve">Leve</option>
      </select>
      <select id="f-estado" onchange="aplicarFiltros()">
        <option value="">Todos los estados</option>
        <option value="nuevo">Nuevo</option>
        <option value="en_reparacion">En reparación</option>
        <option value="reparado">Reparado</option>
      </select>
      <button class="btn btn-primary" onclick="cargarDatos()">↻ Actualizar</button>
      <button class="btn btn-success" onclick="exportarExcel()">⬇ Exportar Excel</button>
    </div>

    <h2>Leyenda</h2>
    <div class="leyenda">
      <div class="ley-item"><div class="ley-dot" style="background:#ef5350"></div>Crítico</div>
      <div class="ley-item"><div class="ley-dot" style="background:#ff7043"></div>Grave</div>
      <div class="ley-item"><div class="ley-dot" style="background:#ffa726"></div>Moderado</div>
      <div class="ley-item"><div class="ley-dot" style="background:#66bb6a"></div>Leve</div>
    </div>

    <h2>Últimos baches</h2>
    <div id="lista-baches"></div>
  </div>

  <!-- ── Mapa ── -->
  <div id="mapa"></div>
</div>

<script>
const API = '';  // mismo origen que el servidor FastAPI
let mapa, capaCalor, capaMarkers;
let vistaActual = 'calor';
let todosLosBaches = [];

// ── Inicializar mapa ─────────────────────────────────────────
function iniciarMapa() {
  mapa = L.map('mapa', { zoomControl: true }).setView([-0.2201, -78.5123], 13);

  // Capa base: OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }).addTo(mapa);

  capaCalor   = L.heatLayer([], {
    radius: 28, blur: 22, maxZoom: 16,
    gradient: { 0.2: '#66bb6a', 0.4: '#ffa726', 0.7: '#ff7043', 1.0: '#ef5350' }
  });
  capaMarkers = L.layerGroup();

  capaCalor.addTo(mapa);
}

// ── Cargar datos desde la API ────────────────────────────────
async function cargarDatos() {
  const sev    = document.getElementById('f-severidad').value;
  const estado = document.getElementById('f-estado').value;
  let url = `${API}/api/baches?limit=2000`;
  if (sev)    url += `&severidad=${sev}`;
  if (estado) url += `&estado=${estado}`;

  const [geojson, stats, calor] = await Promise.all([
    fetch(url).then(r => r.json()),
    fetch(`${API}/api/baches/estadisticas`).then(r => r.json()),
    fetch(`${API}/api/baches/mapa-calor`).then(r => r.json()),
  ]);

  todosLosBaches = geojson.features || [];
  actualizarKpis(stats);
  actualizarMapa(calor.puntos || [], todosLosBaches);
  actualizarLista(todosLosBaches.slice(0, 20));
}

function actualizarKpis(s) {
  document.getElementById('k-total').textContent = s.total || 0;
  document.getElementById('k-rep').textContent   = s.reparados || 0;
  document.getElementById('k-crit').textContent  = s.criticos_activos || 0;
  document.getElementById('k-costo').textContent = `$${(s.costo_estimado_total||0).toLocaleString('es-EC', {maximumFractionDigits:0})}`;
}

function actualizarMapa(puntosCalor, features) {
  capaCalor.setLatLngs(puntosCalor);
  capaMarkers.clearLayers();

  const colores = { critico:'#ef5350', grave:'#ff7043', moderado:'#ffa726', leve:'#66bb6a' };

  features.forEach(f => {
    const p   = f.properties;
    const sev = p.severidad || 'leve';
    const col = colores[sev] || '#90bfdf';

    const marcador = L.circleMarker([p.latitud, p.longitud], {
      radius: sev === 'critico' ? 10 : sev === 'grave' ? 8 : 6,
      color: col, fillColor: col, fillOpacity: 0.85, weight: 2
    });

    marcador.bindPopup(popupHTML(p), { maxWidth: 280 });
    capaMarkers.addLayer(marcador);
  });
}

function popupHTML(p) {
  const fecha    = p.fecha ? new Date(p.fecha).toLocaleString('es-EC') : '—';
  const fotoUrl     = `${API}/api/baches/${p.id}/foto`;
  const panoramaUrl = `${API}/api/baches/${p.id}/panorama`;
  const infoZoom    = `Bache #${p.id} | ${(p.severidad||'').toUpperCase()} | ${fecha}`;
  const fotoHTML = p.tiene_foto
    ? `<img src="${fotoUrl}"
            class="popup-foto"
            alt="Foto bache #${p.id}"
            onclick="abrirModal('${fotoUrl}', '${infoZoom}')"
            onerror="this.outerHTML='<div style=\\'padding:8px;text-align:center;color:#aaa;font-size:.75rem;border:1px dashed #ccc;border-radius:4px;margin-top:8px\\'>Foto no disponible</div>'"
       />
       <button class="btn-reparar" style="background:#1565c0;margin-top:6px"
               onclick="abrirModal('${panoramaUrl}', 'Panorama — ${infoZoom}')">
         🌐 Ver panorama completo
       </button>`
    : `<div style="padding:8px;text-align:center;color:#aaa;font-size:.75rem;border:1px dashed #ccc;border-radius:4px;margin-top:8px">Sin foto</div>`;

  return `
    <div class="popup-bache">
      <h3>Bache #${p.id} — <span style="color:${severColor(p.severidad)}">${(p.severidad||'').toUpperCase()}</span></h3>
      <table>
        <tr><td><b>Confianza</b></td><td>${((p.confianza||0)*100).toFixed(1)}%</td></tr>
        <tr><td><b>Estado</b></td><td>${(p.estado||'').replace('_',' ')}</td></tr>
        <tr><td><b>Zona</b></td><td>${p.zona||'—'}</td></tr>
        <tr><td><b>Fecha</b></td><td>${fecha}</td></tr>
        <tr><td><b>Costo est.</b></td><td>$${(p.costo_estimado||0).toFixed(2)}</td></tr>
        <tr><td><b>GPS</b></td><td>${(p.latitud||0).toFixed(5)}, ${(p.longitud||0).toFixed(5)}</td></tr>
      </table>
      ${fotoHTML}
      <button class="btn-reparar" onclick="marcarReparado(${p.id})">✓ Marcar como reparado</button>
    </div>`;
}

function abrirModal(url, info) {
  document.getElementById('modal-img').src  = url;
  document.getElementById('modal-info').textContent = info;
  document.getElementById('modal-foto').classList.add('visible');
}

function cerrarModal() {
  document.getElementById('modal-foto').classList.remove('visible');
  document.getElementById('modal-img').src = '';
}

function severColor(s) {
  return {critico:'#ef5350',grave:'#ff7043',moderado:'#ffa726',leve:'#66bb6a'}[s]||'#fff';
}

async function marcarReparado(id) {
  await fetch(`${API}/api/baches/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({estado:'reparado'})
  });
  mapa.closePopup();
  cargarDatos();
}

function actualizarLista(features) {
  const lista = document.getElementById('lista-baches');
  lista.innerHTML = features.map(f => {
    const p = f.properties;
    const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-EC') : '—';
    return `
      <div class="bache-item ${p.severidad}" onclick="mapa.setView([${p.latitud},${p.longitud}], 18)">
        <div class="bi-header">
          <span>#${p.id} — ${fecha}</span>
          <span class="bi-sev sev-${p.severidad}">${(p.severidad||'').toUpperCase()}</span>
        </div>
        <div class="bi-coords">📍 ${(p.latitud||0).toFixed(5)}, ${(p.longitud||0).toFixed(5)}</div>
        <div class="bi-costo">💵 $${(p.costo_estimado||0).toFixed(2)}  |  ${((p.confianza||0)*100).toFixed(0)}% conf.</div>
      </div>`;
  }).join('');
}

function aplicarFiltros() { cargarDatos(); }

function setVista(vista) {
  vistaActual = vista;
  document.getElementById('btn-calor').classList.toggle('activo', vista === 'calor');
  document.getElementById('btn-puntos').classList.toggle('activo', vista === 'puntos');

  if (vista === 'calor') {
    if (!mapa.hasLayer(capaCalor)) mapa.addLayer(capaCalor);
    mapa.removeLayer(capaMarkers);
  } else {
    mapa.removeLayer(capaCalor);
    if (!mapa.hasLayer(capaMarkers)) mapa.addLayer(capaMarkers);
  }
}

function exportarExcel() {
  const sev    = document.getElementById('f-severidad').value;
  const estado = document.getElementById('f-estado').value;
  let url = `${API}/api/reportes/excel?`;
  if (sev)    url += `severidad=${sev}&`;
  if (estado) url += `estado=${estado}&`;
  window.open(url, '_blank');
}

// Reloj
function actualizarReloj() {
  document.getElementById('reloj').textContent =
    new Date().toLocaleString('es-EC', {hour12: false});
}

// Cerrar modal con Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

// ── Inicio ───────────────────────────────────────────────────
iniciarMapa();
cargarDatos();
setInterval(cargarDatos, 30_000);   // actualizar cada 30 seg
setInterval(actualizarReloj, 1000);
actualizarReloj();
</script>
</body>
</html>
